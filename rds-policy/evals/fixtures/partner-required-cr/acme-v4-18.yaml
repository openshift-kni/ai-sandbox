apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: acme-policies-v4-18
policyDefaults:
  namespace: ztp-acme-v4-18
  placement:
    labelSelector:
      cluster-version: "v4.18"
  remediationAction: enforce
  severity: low
policies:
- name: acme-config-policy
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "1"
  manifests:
    - path: source-crs/DisconnectedICSP.yaml
      patches:
      - spec:
          repositoryDigestMirrors:
          - mirrors:
            - registry.acme.example.com:5000
            source: registry.redhat.io
- name: acme-sub-policy
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "2"
  manifests:
    - path: source-crs/SubscriptionOCP.yaml
      patches:
      - spec:
          channel: "stable-4.18"
