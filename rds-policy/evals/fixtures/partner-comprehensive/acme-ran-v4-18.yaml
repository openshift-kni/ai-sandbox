apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: acme-ran-v4-18
policyDefaults:
  namespace: ztp-acme-v4-18
  placement:
    labelSelector:
      cluster-version: "v4.18"
      acme-policy: "v1"
  remediationAction: enforce
  severity: low
policies:
- name: acme-ran-config-policy
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "10"
  manifests:
    - path: custom-crs/AcmeMonitoring.yaml
    - path: source-crs/PtpConfigSlave.yaml
      patches:
      - spec:
          profile:
          - name: slave
            interface: ens7f0
    - path: custom-crs/AcmePtpConfig.yaml
    - path: source-crs/TunedPerformancePatch.yaml
      patches:
      - spec:
          profile:
          - name: performance-patch
            data: |
              [main]
              summary=ACME custom tuning with timer migration disabled
              include=openshift-node-performance-openshift-node-performance-profile
              [sysctl]
              kernel.timer_migration=0
              [scheduler]
              group.ice-ptp=0:f:10:*:ice-ptp.*
              group.ice-gnss=0:f:10:*:ice-gnss.*
              group.ice-dplls=0:f:10:*:ice-dplls.*
              [service]
              service.stalld=start,enable
              service.chronyd=stop,disable
          recommend:
          - machineConfigLabels:
              machineconfiguration.openshift.io/role: "master"
            priority: 19
            profile: performance-patch
- name: acme-ptp-secondary-policy
  policyAnnotations:
    ran.openshift.io/ztp-deploy-wave: "10"
  manifests:
    - path: source-crs/PtpConfigSlave.yaml
      patches:
      - spec:
          profile:
          - name: slave
            interface: ens8f0
