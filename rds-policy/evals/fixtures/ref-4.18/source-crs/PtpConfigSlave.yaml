apiVersion: ptp.openshift.io/v1
kind: PtpConfig
metadata:
  name: du-ptp-slave
  namespace: openshift-ptp
  annotations:
    ran.openshift.io/ztp-deploy-wave: "10"
spec:
  profile:
    - name: slave
      ptp4lOpts: "-2 -s --summary_interval -4"
      phc2sysOpts: "-a -r -n 24"
      interface: ens5f0
